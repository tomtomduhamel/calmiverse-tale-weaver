        <style>
      /* Simple & Elegant Production Loader */
      #root-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #D6EAF8 0%, #C9E4DE 100%);
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loader-dots {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }
      .dot {
        width: 10px;
        height: 10px;
        background: #457B9D;
        border-radius: 50%;
        animation: pulse 1.5s infinite ease-in-out;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 100% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
      }
    </style>
    
    <script>
      (function() {
        // Essential Environment Detection
        window.__CALMI_MAIN_START = Date.now();
        window.__CALMI_PREVIEW_MODE = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) && (window.self !== window.top);
        window.__CALMI_BOOT_LOGS = [];
        console.log('🚀 [Calmi] Booting in ' + (window.__CALMI_PREVIEW_MODE ? 'Preview' : 'Standard') + ' mode');
        
        // Emergency Recovery Mode detection/trigger
        setTimeout(function() {
          var loader = document.getElementById('root-loader');
          if (loader && loader.parentNode) {
            console.warn('⚠️ [Calmi] Boot timeout detected. Showing emergency recovery link.');
            var recovery = document.createElement('div');
            recovery.id = 'emergency-recovery';
            recovery.innerHTML = '<a href="#" onclick="window.__calmiReset(); return false;" style="color: #457B9D; text-decoration: underline; font-size: 0.8rem; margin-top: 20px; display: block; opacity: 0.8;">L\'application semble bloquée ? Cliquez ici pour réparer</a>';
            loader.appendChild(recovery);
          }
        }, 12000); // 12 seconds before showing recovery link

        window.__calmiReset = function() {
          if (confirm("Voulez-vous réinitialiser l'application ? Cela peut résoudre les problèmes de chargement.")) {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
                if ('caches' in window) {
                   caches.keys().then(function(names) {
                     names.forEach(function(n) { caches.delete(n); });
                     localStorage.clear();
                     sessionStorage.clear();
                     location.reload(true);
                   });
                } else {
                   location.reload(true);
                }
              });
            } else {
              location.reload(true);
            }
          }
        };
      })();
    </script>
