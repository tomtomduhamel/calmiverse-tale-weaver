name: Auto Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lock'
      - 'bun.lockb'
      - 'docs/**'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump and Push Version
        run: |
          # Ensure we are on the main branch and up-to-date
          git checkout main
          git pull origin main

          # Bump the version (patch: 1.3.4 -> 1.3.5)
          # Updates package.json and package-lock.json, commits and tags
          npm version patch -m "chore: bump version to %s [skip ci]"

          # Push the commit and the tags back to GitHub
          git push origin main --follow-tags
